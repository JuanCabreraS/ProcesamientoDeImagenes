<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Galería de Videos</title>

  <link rel="stylesheet" href="PantallaVideos.css" />
  <link rel="stylesheet" href="Fondo.css" />
  <link rel="stylesheet" href="Formato.css" />
</head>

<body class="theme-monterrey page-videos">
  <main class="screen">
    <section class="content" aria-label="Pantalla Galería de Videos">

      <div class="panel">
        <header class="topbar">
          <button id="backToPlayerBtn" class="icon-btn" type="button" aria-label="Regresar">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 6 9 12l6 6"
                    fill="none" stroke="currentColor" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

          <div class="topbar__center">
            <img class="wordmark" src="FIFA.R..png" alt="FIFA.R.">
            <div class="topbar__subtitle">Galería de Videos</div>
          </div>

          <button class="icon-btn" type="button" aria-label="Inicio" data-home>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3.2 3.5 10.2a1 1 0 0 0-.36.77V20a1.5 1.5 0 0 0 1.5 1.5H9a1 1 0 0 0 1-1v-5h4v5a1 1 0 0 0 1 1h4.36A1.5 1.5 0 0 0 20.86 20v-9.03a1 1 0 0 0-.36-.77L12 3.2Z"
                    fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            </svg>
          </button>
        </header>

        <div class="panel__inner panel__inner--videos">
          <div class="section-head">
            <h1 class="section-title">Videos de los paises</h1>
            <p class="section-text">Selecciona un video para reproducirlo.</p>
          </div>

          <div class="video-gallery">

            <button
              class="video-card"
              type="button"
              data-title="Alemania"
              data-video="videos/Alemania.mp4"
              data-poster="miniaturas/alemania.jpg">

              <div class="video-thumb-wrap">
                <img class="video-thumb" src="miniaturas/alemania.jpg" alt="Miniatura Alemania">
                <span class="play-badge">▶</span>
              </div>

              <div class="video-info">
                <div class="video-title">Alemania</div>
                <div class="video-meta">Alemania</div>
              </div>
            </button>

            <button
              class="video-card"
              type="button"
              data-title="Canada"
              data-video="videos/Canada.mp4"
              data-poster="miniaturas/canada.jpg">

              <div class="video-thumb-wrap">
                <img class="video-thumb" src="miniaturas/canada.jpg" alt="Miniatura Canada">
                <span class="play-badge">▶</span>
              </div>

              <div class="video-info">
                <div class="video-title">Canada</div>
                <div class="video-meta">Canada</div>
              </div>
            </button>

            <button
              class="video-card"
              type="button"
              data-title="Catar"
              data-video="videos/Catar.mp4"
              data-poster="miniaturas/catar.jpg">

              <div class="video-thumb-wrap">
                <img class="video-thumb" src="miniaturas/catar.jpg" alt="Miniatura Catar">
                <span class="play-badge">▶</span>
              </div>

              <div class="video-info">
                <div class="video-title">Catar</div>
                <div class="video-meta">Catar</div>
              </div>
            </button>

            <button
              class="video-card"
              type="button"
              data-title="Curacao"
              data-video="videos/Curacao.mp4"
              data-poster="miniaturas/curacao.jpg">

              <div class="video-thumb-wrap">
                <img class="video-thumb" src="miniaturas/curacao.jpg" alt="Miniatura Curacao">
                <span class="play-badge">▶</span>
              </div>

              <div class="video-info">
                <div class="video-title">Curacao</div>
                <div class="video-meta">Curacao</div>
              </div>
            </button>

            <button
              class="video-card"
              type="button"
              data-title="Ecuador"
              data-video="videos/Ecuador.mp4"
              data-poster="miniaturas/ecuador.jpg">

              <div class="video-thumb-wrap">
                <img class="video-thumb" src="miniaturas/ecuador.jpg" alt="Miniatura Ecuador">
                <span class="play-badge">▶</span>
              </div>

              <div class="video-info">
                <div class="video-title">Ecuador</div>
                <div class="video-meta">Ecuador</div>
              </div>
            </button>

            <button
              class="video-card"
              type="button"
              data-title="Egipto"
              data-video="videos/Egipto.mp4"
              data-poster="miniaturas/egipto.jpg">

              <div class="video-thumb-wrap">
                <img class="video-thumb" src="miniaturas/egipto.jpg" alt="Miniatura Egipto">
                <span class="play-badge">▶</span>
              </div>

              <div class="video-info">
                <div class="video-title">Egipto</div>
                <div class="video-meta">Egipto</div>
              </div>
            </button>

          </div>
        </div>
      </div>

    </section>
  </main>

  <div id="videoModal" class="video-modal" aria-hidden="true">
    <div class="video-modal__backdrop"></div>

    <div class="video-modal__content" role="dialog" aria-modal="true" aria-labelledby="videoModalTitle">
      <div class="video-modal__top">
        <div id="videoModalTitle" class="video-modal__title">Video</div>

        <button id="closeVideoBtn" class="video-close" type="button" aria-label="Cerrar video">
          ✕
        </button>
      </div>

      <video id="galleryVideoPlayer" class="gallery-player" controls playsinline></video>
    </div>
  </div>

  <script src="Usar_camara.js" defer></script>
  <script src="Camaras.js" defer></script>
</body>
</html>
