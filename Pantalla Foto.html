<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Tomar Foto</title>

  <link rel="stylesheet" href="PantallaFoto.css" />
  <link rel="stylesheet" href="Fondo.css" />
  <link rel="stylesheet" href="Formato.css" />
  <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<link rel="icon" href="data:,">
</head>

<body class="theme-monterrey page-foto">
  <main class="ar-stage" aria-label="Pantalla para tomar foto">
    <video id="photoVideo" class="camera-video" autoplay playsinline muted></video>
    <canvas id="arCanvas" class="ar-canvas" aria-hidden="true"></canvas>
    <canvas id="fxCanvas" class="ar-canvas" aria-hidden="true"></canvas>
    <canvas id="photoCanvas" class="hidden-canvas" aria-hidden="true"></canvas>

    <header class="topbar topbar--floating">
      <button id="backBtn" class="nav-btn" type="button" aria-label="Regresar">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 6 9 12l6 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="topbar__center">
        <img class="wordmark" src="FIFA.R..png" alt="FIFA.R.">
      </div>

      <button class="nav-btn" type="button" aria-label="Inicio" data-home>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3.2 3.5 10.2a1 1 0 0 0-.36.77V20a1.5 1.5 0 0 0 1.5 1.5H9a1 1 0 0 0 1-1v-5h4v5a1 1 0 0 0 1 1h4.36A1.5 1.5 0 0 0 20.86 20v-9.03a1 1 0 0 0-.36-.77L12 3.2Z"
                fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
      </button>
    </header>

    <div id="photoStatus" class="photo-status">Cargando jugador…</div>

    <div id="emotePill" class="emote-pill" aria-hidden="true">
      <span class="emote-pill__icon" aria-hidden="true"></span>
      <span class="emote-pill__text">Emote</span>
    </div>

    <div class="emote-stack" aria-label="Animaciones">
      <button class="emote-btn" type="button" data-anim="Dance_Loop" data-label="Dance" data-emoji="💃" aria-pressed="false">
        <span aria-hidden="true">D</span>
      </button>

      <button class="emote-btn" type="button" data-anim="Victory" data-label="Victory" data-emoji="🏆" aria-pressed="false">
        <span aria-hidden="true">V</span>
      </button>

      <button class="emote-btn" type="button" data-anim="Yes" data-label="Yes" data-emoji="👍" aria-pressed="false">
        <span aria-hidden="true">Y</span>
      </button>
    </div>

    <div id="emoteSticker" class="emote-sticker" aria-hidden="true">
      <span class="emote-sticker__emoji">⚽</span>
      <span class="emote-sticker__label">Emote</span>
    </div>

    <section class="capture-panel capture-panel--floating" aria-label="Panel de captura">
      <div class="capture-row">
        <button id="switchCamBtn" class="switchcam-btn" type="button">Cambiar cámara</button>
        <button id="photoConfettiBtn" class="switchcam-btn" type="button">Confeti</button>
      </div>

      <button id="shutterBtn" class="shutter" type="button" aria-label="Tomar foto">
        <span class="shutter-ic" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M9 7 10.2 5.5h3.6L15 7h2a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h2Z"
                  fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M12 17a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"
                  fill="none" stroke="currentColor" stroke-width="1.6"/>
          </svg>
        </span>
      </button>
    </section>
  </main>

  <script src="Usar_camara.js" defer></script>
  <script src="Camaras.js" defer></script>
  <script type="module" src="AR.js?v=5"></script>
</body>
</html>
