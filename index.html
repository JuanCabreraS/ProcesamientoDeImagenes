<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FIFA.R.</title>

  <link rel="stylesheet" href="PantallaQR.css" />
  <link rel="stylesheet" href="Fondo.css" />
  <link rel="stylesheet" href="Formato.css" />

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body class="theme-monterrey page-qr page-marker">
  <main class="screen">
    <section class="content" aria-label="Pantalla principal AR">

      <div class="panel">
        <header class="panel__top">
          <div class="panel__brand">
            <img class="brand-logo" src="Logo FIFA.R..jpeg" alt="Logo FIFA.R.">
          </div>

          <div class="topbar__center">
            <img class="wordmark" src="FIFA.R..png" alt="FIFA.R.">
          </div>

          <div class="panel__sub">Mundial FIFA 2026</div>
        </header>

        <div class="panel__inner">
          <div class="panel__bar" aria-label="Título sección">
            <span class="bar__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M12 3 4 7v5c0 5.2 3.4 8.7 8 10 4.6-1.3 8-4.8 8-10V7l-8-4Z"
                      fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                <path d="M9 12.2 11 14l4-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span>Escáner AR</span>
          </div>

          <div class="scan-box" role="region" aria-label="Área de escaneo AR">
            <div id="markerFrame" class="scan-frame scan-frame--marker">
              <video id="markerBgVideo" class="scan-video scan-video--ar" autoplay playsinline muted></video>

              <a-scene
                id="markerScene"
                class="marker-ar-layer"
                embedded
                mindar-image="imageTargetSrc: marcadorweb.mind; autoStart: true; uiLoading: no; uiScanning: no; uiError: no;"
                color-space="sRGB"
                renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
                vr-mode-ui="enabled: false"
                device-orientation-permission-ui="enabled: false">

                <a-assets>
                  <a-asset-item id="modeloGLB" src="Futbolista.glb"></a-asset-item>
                </a-assets>

                <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

                <a-entity id="markerTarget" mindar-image-target="targetIndex: 0">
                  <a-entity
                    id="markerModelWrap"
                    position="0 -0.18 0"
                    rotation="0 0 0"
                    scale="0.28 0.28 0.28"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
                    <a-gltf-model id="markerPlayerModel" src="#modeloGLB"></a-gltf-model>
                  </a-entity>
                </a-entity>
              </a-scene>

              <div class="scan-ball" aria-hidden="true">⚽</div>
              <div class="scan-pill">Apunta al marcador oficial</div>
              <div id="qrStatus" class="scan-status" aria-live="polite">Inicializando cámara AR…</div>
            </div>
          </div>

          <ul class="tips" aria-label="Consejos">
            <li><span class="tip-ic" aria-hidden="true">🧿</span> Apunta al marcadorweb impreso o en otra pantalla</li>
            <li><span class="tip-ic" aria-hidden="true">📏</span> Mantén una distancia media para que el marcador entre completo</li>
            <li><span class="tip-ic" aria-hidden="true">💡</span> Cuando aparezca el jugador, podrás continuar a la trivia</li>
          </ul>

          <button id="scanBtn" class="action-btn" type="button" disabled>
            <span class="bolt" aria-hidden="true">⚡</span> Busca el marcador
          </button>

          <button id="switchQrCamBtn" class="switchcam-inline" type="button" disabled>
            AR usa cámara trasera
          </button>
        </div>
      </div>

    </section>
  </main>

  <script src="Usar_camara.js" defer></script>
  <script src="Camaras.js" defer></script>
</body>
</html>
